# Streamlit theme for the DGA fleet-health dashboard.
[theme]
base = "light"
primaryColor = "#4f46e5"
backgroundColor = "#f6f7fb"
secondaryBackgroundColor = "#ffffff"
textColor = "#1c2128"
font = "sans serif"

[server]
headless = true
# "auto" reloads code on save (dev comfort); switch back to "none" for demos
# so a mid-presentation file save can never interrupt the app.
fileWatcherType = "auto"
runOnSave = true

[browser]
gatherUsageStats = false
